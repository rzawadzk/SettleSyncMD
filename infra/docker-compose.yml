version: '3.8'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-settlesync}
      POSTGRES_USER: ${POSTGRES_USER:-settlesync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-settlesync}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================================
  # Backend API
  # ============================================================
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-settlesync}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-settlesync}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      HMAC_SECRET: ${HMAC_SECRET:?Set HMAC_SECRET in .env}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@settlesync.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SettleSync}
      APP_URL: ${APP_URL:?Set APP_URL in .env}
      API_URL: ${API_URL:-http://backend:3001}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-72}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@settlesync.local}
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Frontend (built static files served by nginx)
  # ============================================================
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  uploads:

networks:
  internal:
    driver: bridge
